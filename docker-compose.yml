# SQL Injection Training Lab - Root docker-compose (convenience)
# EDUCATIONAL USE ONLY
version: '3.8'

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: shopdb
    volumes:
      - ./schemas/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: shopdb
      DB_PORT: "3306"
      SECRET_KEY: "lab-secret-key-for-training-only"  # Weak key makes session forgery trivial - intentional for training
      DEBUG: "True"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
